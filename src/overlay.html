<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACM Overlay</title>
    <style>
      :root {
        color-scheme: dark;
        --panel: rgba(10, 14, 19, 0.86);
        --panel-edge: rgba(188, 212, 255, 0.14);
        --text: #eef4ff;
        --muted: #9fb4d1;
        --accent: #9ad0ff;
        --btn: rgba(154, 208, 255, 0.14);
        --btn-border: rgba(154, 208, 255, 0.32);
        --btn-on: rgba(120, 220, 150, 0.18);
        --btn-on-border: rgba(120, 220, 150, 0.4);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, sans-serif;
      }

      body { padding: 14px; }

      .overlay-card {
        width: 100%;
        height: 100%;
        border-radius: 12px;
        border: 1px solid var(--panel-edge);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0)),
          var(--panel);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
        padding: 16px 18px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        backdrop-filter: blur(10px);
      }

      .eyebrow {
        font-size: 10px;
        letter-spacing: 1.4px;
        text-transform: uppercase;
        color: var(--accent);
      }

      .title {
        margin-top: 6px;
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
      }

      #ft-btn {
        margin-top: 12px;
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--btn-border);
        background: var(--btn);
        color: var(--text);
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: background .15s, border-color .15s, opacity .15s;
      }
      #ft-btn:hover:not(:disabled) { background: rgba(154, 208, 255, 0.22); }
      #ft-btn:disabled { opacity: .45; cursor: default; }
      #ft-btn.on { background: var(--btn-on); border-color: var(--btn-on-border); }
      #ft-btn.on:hover:not(:disabled) { background: rgba(120, 220, 150, 0.26); }

      #ft-status {
        margin-top: 10px;
        font-size: 11.5px;
        line-height: 1.5;
        color: var(--muted);
      }

      .footer {
        margin-top: 10px;
        display: flex;
        justify-content: flex-end;
        font-size: 10.5px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="overlay-card">
      <div>
        <div class="eyebrow">ACM Overlay</div>
        <div class="title">Fast Travel</div>
        <button id="ft-btn" type="button">Unlock All Fast Travel</button>
        <div id="ft-status">Checking status…</div>
      </div>
      <div class="footer">
        <span>Hotkey hides this panel</span>
      </div>
    </div>
    <script src="overlay-renderer.js"></script>
  </body>
</html>
