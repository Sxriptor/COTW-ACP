<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACM Overlay</title>
    <style>
      :root {
        color-scheme: dark;
        --panel: rgba(10, 14, 19, 0.82);
        --panel-edge: rgba(188, 212, 255, 0.14);
        --text: #eef4ff;
        --muted: #9fb4d1;
        --accent: #9ad0ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, sans-serif;
      }

      body {
        padding: 14px;
      }

      .overlay-card {
        width: 100%;
        height: 100%;
        border-radius: 12px;
        border: 1px solid var(--panel-edge);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0)),
          var(--panel);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
        padding: 16px 18px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        backdrop-filter: blur(10px);
      }

      .eyebrow {
        font-size: 10px;
        letter-spacing: 1.4px;
        text-transform: uppercase;
        color: var(--accent);
      }

      .title {
        margin-top: 8px;
        font-size: 18px;
        font-weight: 700;
        color: var(--text);
      }

      .copy {
        margin-top: 10px;
        font-size: 12px;
        line-height: 1.55;
        color: var(--muted);
        max-width: 26ch;
      }

      .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        font-size: 11px;
        color: var(--muted);
      }

      .pill {
        padding: 5px 8px;
        border-radius: 999px;
        border: 1px solid rgba(154, 208, 255, 0.22);
        color: var(--text);
        background: rgba(154, 208, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="overlay-card">
      <div>
        <div class="eyebrow">ACM Overlay</div>
        <div class="title">Overlay active</div>
        <div class="copy">This window stays above the game so future tools, fish data, or sonar UI can live here.</div>
      </div>
      <div class="footer">
        <span>Press the hotkey again to hide</span>
        <span class="pill">Prototype</span>
      </div>
    </div>
  </body>
  </html>
